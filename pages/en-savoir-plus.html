<!DOCTYPE html>
<html lang="fr-FR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Savoir Plus | Évasion</title>
    <link rel="stylesheet" href="../css/themes/global.css">
    <style>
        :root {
            --primary-color: #000000;
            --input-border: #cccccc;
            --font-main: 'Segoe UI', Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        /* Style des champs aligné sur ton image */
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--primary-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box; /* Important pour le padding */
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }


        .button-group a {
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .button-group a:hover {
            opacity: 0.8;
        }

        .contact-info {
            margin-top: 30px;
            text-align: center;
        }

        .contact-info a {
            color: black;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        /* Responsive pour mobile */
        @media (max-width: 480px) {
            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>En savoir plus</h1>
        <p>Désireux d'en savoir plus, contactez-nous ici !</p>
    </header>

    <main class="container">
        <form>
            <div class="form-group">
                <label for="nom">Nom complet :</label>
                <input id="nom" type="text" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse Email :</label>
                <input id="email" type="email" placeholder="Votre adresse email" required>
            </div>

            <div class="form-group">
                <label for="message">Message :</label>
                <textarea id="message" placeholder="Votre message" required></textarea>
            </div>

            <div class="button-group">
                <a href="../pages/confirm.html">Envoyer</a>
            </div>
        </form>

        <div class="contact-info">
            <a href="tel:067756084">En cas de problème, appelez-nous.</a>
        </div>
    </main>

</body>
</html>
